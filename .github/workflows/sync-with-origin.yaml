name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' # every day at 00:00
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v2.0
        with:
          base: master
          head: master
          pr_message: 'Sync latest changes from fmhy/edit'